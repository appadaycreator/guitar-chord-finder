    <meta name="theme-color" content="#ff9800"><title>使い方 - ギターコード表</title><style>body{font-family:'Noto Sans JP',sans-serif;background:#2d1b00;color:#ffe0b2;max-width:800px;margin:0 auto;padding:2rem 1rem;line-height:1.8}h1,h2{color:#ffcc80}ol{padding-left:1.5rem}li{margin-bottom:0.5rem}a{color:#ffcc80}</style></head><body><h1>使い方</h1><h2>コードの探し方</h2><ol><li>検索ボックスにコード名を入力（例：Am、G7）</li><li>フィルターボタンでカテゴリを絞り込み</li><li>コードカードをクリックすると詳細（指の配置）が表示されます</li></ol><h2>コード図の見方</h2><p>縦線が弦（左が6弦・右が1弦）、横線がフレット、オレンジの丸が押さえる位置、数字が使う指（1=人差し指）を示しています。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
